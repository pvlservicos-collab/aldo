<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Cadastro de Liderança — Aldo Maurício</title>
  <link rel="icon" type="image/webp" href="img/logo.webp">
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --azul: #091f80;
      --azul-esc: #050e52;
      --azul-med: #0e2eaa;
      --ouro: #f5c518;
      --ouro-esc: #c8a000;
      --verde: #1a8c2a;
      --text-esc: #0a1540;
      --text-med: #3a4a7a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      overflow-x: hidden
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text-esc);
      background: radial-gradient(circle at 50% -10%, var(--azul-med) 0%, var(--azul) 45%, var(--azul-esc) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      position: relative;
      overflow: hidden;
    }

    .estrelas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .estrelas i {
      position: absolute;
      display: block;
      border-radius: 50%;
      background: #fff;
      opacity: .5;
      animation: pisca 2.4s ease-in-out infinite;
    }

    @keyframes pisca {

      0%,
      100% {
        opacity: .15
      }

      50% {
        opacity: .8
      }
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
    }

    .topo {
      text-align: center;
      margin-bottom: 22px;
    }

    .topo img {
      height: 84px;
      margin-bottom: 14px;
    }

    .topo h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(1.9rem, 5vw, 2.4rem);
      color: var(--azul-esc);
      line-height: 1.1;
    }

    .topo p {
      color: var(--text-med);
      font-size: .95rem;
      margin-top: 8px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 24px 60px rgba(5, 14, 82, .45);
    }

    .fg {
      margin-bottom: 16px;
    }

    .fg label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-med);
      margin-bottom: 6px;
    }

    .fg input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #dfe3f2;
      border-radius: 10px;
      font: inherit;
      font-size: 1rem;
      color: var(--text-esc);
      background: #f8f9fd;
    }

    .fg input:focus {
      outline: none;
      border-color: var(--azul-med);
      background: #fff;
    }

    .btn-cadastrar {
      width: 100%;
      padding: 15px;
      margin-top: 6px;
      background: var(--ouro);
      border: none;
      border-radius: 10px;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--azul-esc);
      cursor: pointer;
      transition: filter .15s ease;
    }

    .btn-cadastrar:hover {
      filter: brightness(1.06);
    }

    .btn-cadastrar:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 14px;
      font-size: .88rem;
      text-align: center;
      display: none;
    }

    .msg.erro {
      color: #b33a2e;
    }

    .sucesso {
      text-align: center;
      padding: 26px 22px;
      display: none;
      background: #eaf8ee;
      border: 1.5px solid #bfe8c9;
      border-radius: 14px;
    }

    .sucesso .check {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--verde);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
    }

    .sucesso h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      color: var(--verde);
      margin-bottom: 8px;
    }

    .sucesso p {
      color: var(--text-med);
      font-size: .95rem;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="estrelas" id="estrelas"></div>

  <div class="wrap">
    <div class="card">
      <div class="topo">
        <img src="img/logo.webp" alt="Aldo Maurício">
        <h1>Cadastro de Liderança</h1>
        <p>Faça parte do movimento com Aldo Maurício. Preencha seus dados abaixo.</p>
      </div>

      <form id="form-lideranca">
        <div class="fg">
          <label for="l-nome">Nome completo</label>
          <input type="text" id="l-nome" placeholder="Seu nome completo" required>
        </div>
        <div class="fg">
          <label for="l-numero">WhatsApp</label>
          <input type="tel" id="l-numero" placeholder="(00) 00000-0000" required>
        </div>
        <div class="fg">
          <label for="l-bairro">Bairro</label>
          <input type="text" id="l-bairro" placeholder="Seu bairro" required>
        </div>
        <div class="fg">
          <label for="l-mae">Nome da mãe</label>
          <input type="text" id="l-mae" placeholder="Nome completo da sua mãe" required>
        </div>
        <div class="fg">
          <label for="l-nascimento">Data de nascimento</label>
          <input type="date" id="l-nascimento" required>
        </div>
        <div class="fg">
          <label for="l-endereco">Endereço</label>
          <input type="text" id="l-endereco" placeholder="Rua e número" required>
        </div>
        <button type="submit" class="btn-cadastrar" id="btn-cadastrar">Cadastrar</button>
        <div class="msg erro" id="msg-erro"></div>
      </form>

      <div class="sucesso" id="sucesso">
        <div class="check">✓</div>
        <h2>Cadastro recebido!</h2>
        <p>Obrigado por se juntar ao movimento.</p>
      </div>
    </div>
  </div>

  <script>
    (function criarEstrelas() {
      const c = document.getElementById('estrelas');
      for (let i = 0; i < 50; i++) {
        const s = document.createElement('i');
        const size = Math.random() * 2.2 + 1;
        s.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;width:${size}px;height:${size}px;animation-delay:${(Math.random() * 2).toFixed(1)}s;animation-duration:${(Math.random() * 1.6 + 1.6).toFixed(1)}s`;
        c.appendChild(s);
      }
    })();

    const form = document.getElementById('form-lideranca');
    const btn = document.getElementById('btn-cadastrar');
    const msgErro = document.getElementById('msg-erro');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const nome = document.getElementById('l-nome').value.trim();
      const numero = document.getElementById('l-numero').value.trim();
      const bairro = document.getElementById('l-bairro').value.trim();
      const mae = document.getElementById('l-mae').value.trim();
      const nascimento = document.getElementById('l-nascimento').value.trim();
      const endereco = document.getElementById('l-endereco').value.trim();
      msgErro.style.display = 'none';
      if (!nome || !numero || !bairro || !mae || !nascimento || !endereco) {
        msgErro.textContent = 'Preencha todos os campos obrigatórios.';
        msgErro.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Enviando…';
      try {
        const res = await fetch('/api/lideranca', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, numero, bairro, mae, nascimento, endereco })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Não foi possível enviar. Tente novamente.');
        form.style.display = 'none';
        document.getElementById('sucesso').style.display = 'block';
      } catch (err) {
        msgErro.textContent = err.message;
        msgErro.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Cadastrar';
      }
    });
  </script>
</body>

</html>
