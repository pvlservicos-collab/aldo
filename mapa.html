<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aldo Maurício — Mapa de Lideranças por Bairro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Archivo+Narrow:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#070d24; --bg-1:#0b1233; --bg-2:#101c44;
    --card:#121e48; --card-2:#16234f;
    --border:rgba(255,255,255,.09);
    --text:#e9edf8; --muted:#9aa5c6;
    --gold:#f2c218; --gold-soft:rgba(242,194,24,.14);
    --azul-forte:#132a68;   /* azul escuro escuro — liderança consolidada */
    --azul-medio:#3f64d8;   /* azul escuro claro — liderança em construção */
    --sem:#2b3352;          /* sem liderança cadastrada */
    --verde:#2ee06f;        /* destaque ao passar o mouse */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Archivo',system-ui,-apple-system,Segoe UI,sans-serif;
    background:linear-gradient(160deg,var(--bg-0) 0%,var(--bg-1) 45%,var(--bg-2) 100%);
    color:var(--text);display:flex;flex-direction:column;overflow:hidden;
  }
  main{flex:1;display:flex;min-height:0}
  #map{flex:1;background:var(--bg-0)}
  aside{width:300px;min-width:260px;border-left:1px solid var(--border);background:rgba(9,15,40,.72);display:flex;flex-direction:column;overflow:hidden}
  .panel{padding:16px 18px;border-bottom:1px solid var(--border)}
  .panel h2{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-weight:600}
  .metric-row{display:flex;align-items:center;justify-content:space-between;font-size:13.5px}
  .metric-row b{font-size:20px;font-weight:800;color:#7d9bff}
  .list-wrap{flex:1;overflow-y:auto;padding:10px 12px}
  .search{width:100%;padding:8px 12px;margin-bottom:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;outline:none}
  .search:focus{border-color:var(--gold)}
  .search::placeholder{color:var(--muted)}
  .bairro-item{display:flex;align-items:center;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border)}
  .bairro-item:last-child{border-bottom:none}
  .bairro-item:hover{background:var(--card)}
  .bairro-item.selecionado{background:#050a1c;border-left:3px solid #3f7bff;padding-left:9px}
  .bairro-item.selecionado .bn{color:#7d9bff}
  .bairro-item .bn{font-size:13.5px;font-weight:600}
  .bairro-item .ln{font-size:11px;color:var(--muted);margin-top:1px}
  .list-wrap::-webkit-scrollbar{width:8px}
  .list-wrap::-webkit-scrollbar-thumb{background:var(--card-2);border-radius:4px}

  .leaflet-tooltip.tt, .leaflet-popup-content-wrapper{
    background:var(--card);color:var(--text);border:1px solid var(--border);
    border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.55);font-family:'Archivo',sans-serif;
  }
  .leaflet-tooltip.tt{padding:10px 14px}
  .leaflet-tooltip-top.tt::before{border-top-color:var(--card)}
  .leaflet-tooltip-bottom.tt::before{border-bottom-color:var(--card)}
  .leaflet-tooltip-left.tt::before{border-left-color:var(--card)}
  .leaflet-tooltip-right.tt::before{border-right-color:var(--card)}
  .leaflet-popup-tip{background:var(--card)}
  .tt-bairro{font-family:'Archivo Narrow',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.8px;color:var(--gold)}
  .tt-lid{font-size:14px;font-weight:600;margin-top:5px}
  .tt-num{font-size:13px;color:var(--muted);margin-top:2px}
  .tt-nivel{display:inline-block;margin-top:7px;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;padding:3px 8px;border-radius:20px;background:var(--gold-soft);color:var(--gold);font-weight:600}
  .leaflet-container{font-family:'Archivo',sans-serif}
  .leaflet-bar a{background:var(--card);color:var(--text);border-bottom:1px solid var(--border)}
  .leaflet-bar a:hover{background:var(--card-2)}

  /* quadrado azul brilhante = liderança cadastrada */
  .lid-marker{width:15px;height:15px;background:#3f7bff;border:2px solid #fff;border-radius:3px;box-shadow:0 0 10px 4px rgba(63,123,255,.85);cursor:pointer;transform-origin:center center}
  .tt-end{font-size:12px;color:var(--muted);margin-top:2px}

  /* pin dos locais de votação: bolinha em cima de uma barra, só clareia no hover */
  .voto-pin{position:relative;width:10px;height:22px;cursor:pointer;transform-origin:bottom center}
  .voto-bar{position:absolute;bottom:0;left:50%;width:2px;height:15px;background:linear-gradient(to top,#3a4050,rgba(58,64,80,.12));transform:translateX(-50%);border-radius:2px}
  .voto-dot{position:absolute;top:0;left:50%;width:7px;height:7px;background:#6b5410;border:1.5px solid rgba(255,255,255,.45);border-radius:50%;transform:translateX(-50%);transition:background .2s,box-shadow .2s,border-color .2s}
  .voto-pin:hover .voto-dot{background:#3f7bff;border-color:#fff;box-shadow:0 0 14px 6px rgba(63,123,255,.8)}
  .tt-votos{font-size:12px;color:var(--muted);margin-top:4px}

  @media (max-width:760px){
    main{flex-direction:column}
    aside{width:100%;min-width:0;max-height:30vh;border-left:none;border-top:1px solid var(--border)}
  }
</style>
</head>
<body>

<main>
  <div id="map"></div>
  <aside>
    <div class="panel">
      <h2>Métricas</h2>
      <div class="metric-row"><span>Bairros com liderança</span><b id="st-bairros">0</b></div>
    </div>
    <div class="list-wrap">
      <input class="search" id="search" type="text" placeholder="Buscar liderança…">
      <h2 style="margin:4px 0 10px">Lideranças</h2>
      <div id="lista"></div>
    </div>
  </aside>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

let LIDERANCAS_GEO = [];
const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g," ").trim();

const map = L.map("map",{zoomControl:true,zoomSnap:0.25}).setView([0.032,-51.07],13);

/* Fundo escuro (estilo Google Maps dark): ruas embaixo, nomes por cima dos bairros */
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",{
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:"abcd", maxZoom:19
}).addTo(map);
map.createPane("rotulos");
map.getPane("rotulos").style.zIndex = 649;          /* acima dos polígonos, mas abaixo dos tooltips (650) */
map.getPane("rotulos").style.pointerEvents = "none"; /* não atrapalha o mouse */
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png",{
  pane:"rotulos", subdomains:"abcd", maxZoom:19
}).addTo(map);

/* ponto-dentro-de-polígono simples (ray casting), pra saber em qual bairro
   cada local de votação cai (o CSV não vem com bairro, só endereço) */
function pontoNoPoligono(lng, lat, coords){
  let dentro = false;
  for (let i=0, j=coords.length-1; i<coords.length; j=i++){
    const xi=coords[i][0], yi=coords[i][1], xj=coords[j][0], yj=coords[j][1];
    const intersecta = ((yi>lat)!==(yj>lat)) && (lng < (xj-xi)*(lat-yi)/(yj-yi)+xi);
    if (intersecta) dentro = !dentro;
  }
  return dentro;
}
/* centróide simples (média dos vértices) + raio (distância até o vértice mais
   longe) — usado só como fallback quando o ponto cai fora de todos os
   polígonos (geocodificação imprecisa perto da borda do bairro), pra não
   perder o local da contagem. O raio evita que um ponto bem longe (ex: escola
   rural fora da área mapeada) seja "puxado" pro bairro mapeado mais próximo
   só por ser o menos-longe entre 27 opções — só aceita se estiver dentro de
   uma vizinhança razoável do bairro. */
const CENTROIDES = {}, RAIOS = {};
BAIRROS_GEO.features.forEach(f => {
  const coords = f.geometry.coordinates[0];
  let sx = 0, sy = 0;
  coords.forEach(([x, y]) => { sx += x; sy += y; });
  const cx = sx / coords.length, cy = sy / coords.length;
  CENTROIDES[f.properties.name] = [cx, cy];
  let maxD = 0;
  coords.forEach(([x, y]) => { const d = Math.hypot(x - cx, y - cy); if (d > maxD) maxD = d; });
  RAIOS[f.properties.name] = maxD;
});
function bairroMaisProximo(lat, lng){
  let melhor = null, menorDist = Infinity;
  for (const f of BAIRROS_GEO.features){
    const [cx, cy] = CENTROIDES[f.properties.name];
    const d = Math.hypot(cx - lng, cy - lat);
    if (d < menorDist){ menorDist = d; melhor = f.properties.name; }
  }
  if (melhor && menorDist <= RAIOS[melhor] * 1.3) return melhor;
  return null;
}
function bairroDoPonto(lat, lng){
  for (const f of BAIRROS_GEO.features){
    if (pontoNoPoligono(lng, lat, f.geometry.coordinates[0])) return f.properties.name;
  }
  return bairroMaisProximo(lat, lng);
}
const locaisPorBairro = {};
function calcularLocaisPorBairro(locais){
  BAIRROS_GEO.features.forEach(f => { locaisPorBairro[f.properties.name] = []; });
  locais.forEach(loc => {
    if (loc.lat == null) return;
    const nome = bairroDoPonto(loc.lat, loc.lng);
    if (nome) locaisPorBairro[nome].push(loc);
  });
}

/* lideranças cadastradas cujo texto de bairro bate (por aproximação) com o
   nome do polígono */
function liderancasDoBairro(nomePoligono){
  const alvo = norm(nomePoligono);
  return LIDERANCAS_GEO.filter(l => {
    const b = norm(l.bairro);
    return b && (b.includes(alvo) || alvo.includes(b));
  });
}

function tooltipBairro(nome){
  const lids = liderancasDoBairro(nome);
  const locais = (locaisPorBairro[nome] && locaisPorBairro[nome].length) || 0;
  let linhaLid;
  if (lids.length === 0) linhaLid = "0 lideranças";
  else if (lids.length === 1) linhaLid = "Liderança: " + lids[0].nome;
  else linhaLid = lids.length + " lideranças";
  return `<div class="tt-bairro">${nome}</div><div class="tt-num">Locais de votação: ${locais}</div><div class="tt-num">${linhaLid}</div>`;
}

function estiloBairro(nome){
  const tem = liderancasDoBairro(nome).length > 0;
  return tem
    ? { color:"transparent", weight:1.5, fillColor:"#3a5578", fillOpacity:.015 }
    : { color:"rgba(255,255,255,.08)", weight:1, fillColor:"#3a5578", fillOpacity:0 };
}

const camadas = {};
const geoLayer = L.geoJSON(BAIRROS_GEO, {
  style: f => estiloBairro(f.properties.name),
  onEachFeature: (f, layer) => {
    const nome = f.properties.name;
    camadas[nome] = layer;
    layer.bindTooltip(nome, {className:"tt", sticky:true, direction:"top", opacity:1});
    layer.on("mouseover", e => {
      e.target.setTooltipContent(tooltipBairro(nome));
      if (liderancasDoBairro(nome).length === 0) {
        e.target.setStyle({ color:"rgba(255,255,255,.4)", weight:1.5 });
      } else {
        e.target.setStyle({ color:"rgba(63,123,255,.95)", weight:2, fillOpacity:.32 });
      }
    });
    layer.on("mouseout", e => {
      e.target.setStyle(estiloBairro(nome));
    });
    layer.on("click", e => {
      e.target.closeTooltip();
      map.fitBounds(layer.getBounds(), {maxZoom:15, padding:[30,30]});
    });
  }
}).addTo(map);

/* limites do mapa: SEMPRE os 27 bairros mapeados, centrados no centro de
   Macapá — não deixa alguns locais de votação/lideranças bem longe (fora da
   área mapeada, tipo escola rural) esticarem essa visão padrão. Esses pontos
   fora da área ainda aparecem no mapa, só não puxam o zoom/centro padrão. */
const limites = geoLayer.getBounds();
map.fitBounds(limites, {padding:[16,16], animate:false});
function estenderEAjustar(){ /* não mexe mais na visão padrão — ver comentário acima */ }
/* nudge final, chamado só uma vez depois que todos os pontos carregaram —
   um pouco mais próximo que o "cabe todos os bairros" exato */
let fontesCarregadas = 0;
function avisarFonteCarregada(){
  fontesCarregadas++;
  if (fontesCarregadas >= 2){
    map.setZoom(map.getZoom() + 0.8);
    map.panBy([0, -80], {animate:false});
  }
}

function refazerEstilosBairros(){
  Object.keys(camadas).forEach(nome => camadas[nome].setStyle(estiloBairro(nome)));
}

/* escala dos marcadores conforme o zoom: pins de votação encolhem ao dar
   zoom out (não ficam do mesmo tamanho), quadrados de liderança crescem bem
   pouco ao dar zoom in */
const ZOOM_BASE = 13;
function escalaVoto(zoom){
  return Math.min(1.15, Math.max(0.35, Math.pow(1.22, zoom - ZOOM_BASE)));
}
function escalaLid(zoom){
  return Math.min(1.3, Math.max(0.8, Math.pow(1.05, zoom - ZOOM_BASE)));
}
const marcadoresVoto = [];
function aplicarEscala(marker, escala){
  const el = marker.getElement();
  const inner = el && el.firstElementChild;
  if (inner) inner.style.transform = 'scale(' + escala + ')';
}
function reescalarMarcadores(){
  const zoom = map.getZoom();
  const eVoto = escalaVoto(zoom), eLid = escalaLid(zoom);
  marcadoresVoto.forEach(m => aplicarEscala(m, eVoto));
  Object.values(marcadoresLid).forEach(m => aplicarEscala(m, eLid));
}
map.on('zoomend', reescalarMarcadores);

/* Pins dos locais de votação (gerados por scripts/geocode-locais.js a partir do CSV) */
fetch('locais-geo.json')
  .then(r => r.ok ? r.json() : [])
  .catch(() => [])
  .then(locais => {
    calcularLocaisPorBairro(locais);
    locais.forEach(loc => {
      const icon = L.divIcon({
        className: '',
        html: '<div class="voto-pin"><div class="voto-bar"></div><div class="voto-dot"></div></div>',
        iconSize: [10, 22],
        iconAnchor: [5, 22]
      });
      const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map).bindTooltip(
        `<div class="tt-bairro">${loc.nome}</div>
         <div class="tt-num">${loc.endereco}</div>
         <div class="tt-votos">Eleitores aptos (2022): ${loc.aptos.toLocaleString('pt-BR')}</div>`,
        { className: 'tt', sticky: true, direction: 'top', opacity: 1 }
      );
      marcadoresVoto.push(marker);
      estenderEAjustar([loc.lat, loc.lng]);
    });
    refazerEstilosBairros();
    reescalarMarcadores();
    avisarFonteCarregada();
  });

/* Quadrados azuis das lideranças — direto do banco (endpoint autenticado),
   não de um arquivo gerado uma vez. Isso garante que exclusão/cadastro de
   liderança no painel reflete no mapa sem precisar rodar script nenhum.
   Vem TODAS as lideranças (mesmo sem coordenada), pra contagem por bairro
   ser sempre exata — só desenha quadrado em quem tem lat/lng. */
const marcadoresLid = {};
function carregarLiderancas(){
  return fetch('/api/admin/liderancas-geo', { credentials: 'same-origin' })
    .then(r => r.ok ? r.json() : [])
    .catch(() => [])
    .then(lids => {
      LIDERANCAS_GEO = lids;
      lids.forEach(l => {
        if (l.lat == null || l.lng == null) return;
        const icon = L.divIcon({ className:'', html:'<div class="lid-marker"></div>', iconSize:[15,15], iconAnchor:[8,8] });
        const marker = L.marker([l.lat, l.lng], { icon, zIndexOffset: 1000 }).addTo(map).bindTooltip(
          `<div class="tt-bairro">${l.bairro}</div>
           <div class="tt-lid">${l.nome}</div>
           <div class="tt-end">${l.endereco}</div>
           ${l.numero ? `<div class="tt-num">Contato: ${l.numero}</div>` : ""}`,
          { className:'tt', sticky:true, direction:'top', opacity:1 }
        );
        marcadoresLid[l.id] = marker;
        estenderEAjustar([l.lat, l.lng]);
      });
      refazerEstilosBairros();
      atualizarPainel();
      reescalarMarcadores();
      avisarFonteCarregada();
    });
}

let itemSelecionadoDiv = null;
function atualizarPainel(){
  const bairrosSet = new Set(LIDERANCAS_GEO.map(l => norm(l.bairro)).filter(Boolean));
  document.getElementById("st-bairros").textContent = bairrosSet.size;

  const lista = document.getElementById("lista");
  lista.innerHTML = "";
  itemSelecionadoDiv = null;
  LIDERANCAS_GEO.slice().sort((a,b)=>a.nome.localeCompare(b.nome,"pt")).forEach(l=>{
    const div = document.createElement("div");
    div.className = "bairro-item";
    div.dataset.busca = norm(l.nome+" "+l.bairro);
    div.innerHTML = `<div><div class="bn">${l.nome}</div><div class="ln">${l.bairro}</div></div>`;
    div.onclick = () => {
      const jaSelecionado = div.classList.contains("selecionado");
      if (itemSelecionadoDiv) itemSelecionadoDiv.classList.remove("selecionado");
      const m = marcadoresLid[l.id];
      if (jaSelecionado){
        itemSelecionadoDiv = null;
        if (m) m.closeTooltip();
        map.fitBounds(limites, {padding:[16,16]});
        map.setZoom(map.getZoom() + 1.5);
      } else {
        div.classList.add("selecionado");
        itemSelecionadoDiv = div;
        map.setView([l.lat, l.lng], 16);
        if (m) m.openTooltip();
      }
    };
    lista.appendChild(div);
  });
}

document.getElementById("search").addEventListener("input", e=>{
  const q = norm(e.target.value);
  document.querySelectorAll(".bairro-item").forEach(it=>{
    it.style.display = it.dataset.busca.includes(q) ? "" : "none";
  });
});

carregarLiderancas();
</script>
